name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Start preview server for E2E
        run: |
          npm run preview -- --host 127.0.0.1 > "$RUNNER_TEMP/diva-player-preview.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/diva-player-preview.pid"
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/diva-player/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/diva-player-preview.log"
          exit 1
      - name: Player controls E2E
        run: npm run test:e2e:player-controls -- http://127.0.0.1:4173/diva-player/
      - name: Background playback E2E
        run: npm run test:e2e:background-playback -- http://127.0.0.1:4173/diva-player/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Cloudflare artifact
        run: npm run build:cloudflare
      - name: Cloudflare credentials status
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "::warning::Cloudflare deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable it."
      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler pages deploy dist --project-name diva-player --branch main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
