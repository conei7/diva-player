server {
    listen 80;
    server_name _;

    # Frontend static files
    location /diva-player/ {
        alias /usr/share/nginx/html/diva-player/;
        try_files $uri $uri/ /diva-player/index.html;
    }

    # Redirect root to /diva-player/
    location = / {
        return 301 /diva-player/;
    }

    # Proxy backend API requests
    location /backend-api/ {
        proxy_pass http://api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Invidious API requests
    location /invidious-api/ {
        proxy_pass https://inv.nadeko.net/;
        proxy_set_header Host inv.nadeko.net;
        proxy_ssl_server_name on;
    }
}
